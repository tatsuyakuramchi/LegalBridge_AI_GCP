# Cloud Build pipeline for legalbridge-search-api (Cloud Run ①)
#
# Trigger: push to `release/api` branch.
# Builds and deploys services/api/ as the legalbridge-search-api Cloud Run
# service. Configured for low cold-start latency (min-instances=1) so the
# Slack /法務検索 view_submission stays inside the 3-second budget.
#
# Substitutions (override per-trigger if needed):
#   _REGION       — Cloud Run / Artifact Registry region
#   _REPO         — Artifact Registry repository name
#   _SERVICE_NAME — Cloud Run service name

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _SERVICE_NAME: legalbridge-search-api
  # 検索ポータル /work-model が admin-ui のフル機能版(作品モデル)を iframe 埋め込みするための URL。
  _ADMIN_UI_URL: https://legalbridge-admin-ui-988056987352.asia-northeast1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - services/api
    dir: .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

  # Deploy without --set-env-vars so Cloud Run keeps its existing secret
  # bindings (DATABASE_URL, BACKLOG_*, LB_PORTAL_SECRET, etc.).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      # B5b: chromium(puppeteer-core)で PDF をローカル生成するため 1Gi に引き上げ。
      #   512Mi だと PDF レンダリング時に OOM する(worker は 2Gi)。
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "5"
      - --timeout
      - "60"
      # 既存 env/secret は維持したまま ADMIN_UI_URL のみ追加/更新(set ではなく update)。
      - --update-env-vars
      - "ADMIN_UI_URL=${_ADMIN_UI_URL}"
      - --quiet

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - "${_SERVICE_NAME}"
      - --region
      - "${_REGION}"
      - --to-latest
      - --quiet
