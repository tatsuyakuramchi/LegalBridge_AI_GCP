# Cloud Build pipeline for legalbridge-search-api (Cloud Run ①)
#
# Trigger: push to `release/api` branch.
# Builds and deploys services/api/ as the legalbridge-search-api Cloud Run
# service. Configured for low cold-start latency (min-instances=1) so the
# Slack /法務検索 view_submission stays inside the 3-second budget.
#
# Substitutions (override per-trigger if needed):
#   _REGION       — Cloud Run / Artifact Registry region
#   _REPO         — Artifact Registry repository name
#   _SERVICE_NAME — Cloud Run service name

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _SERVICE_NAME: legalbridge-search-api
  # 検索ポータル /work-model が admin-ui のフル機能版(作品モデル)を iframe 埋め込みするための URL。
  #   ※ work-model 埋め込み専用。ADMIN_UI_URL とは分離(あちらは管理トップの admin-ui 移行用)。
  _ADMIN_UI_URL: https://legalbridge-admin-ui-988056987352.asia-northeast1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - services/api
    dir: .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

  # Deploy without --set-env-vars so Cloud Run keeps its existing secret
  # bindings (DATABASE_URL, BACKLOG_*, LB_PORTAL_SECRET, etc.).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      # B5b: chromium(puppeteer-core)で PDF をローカル生成するため 1Gi に引き上げ。
      #   512Mi だと PDF レンダリング時に OOM する(worker は 2Gi)。
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "5"
      - --timeout
      - "60"
      # 既存 env/secret は維持したまま、work-model 埋め込み専用の WORK_MODEL_UI_URL を設定。
      #   先に誤って設定した ADMIN_UI_URL(=ポータル全体が admin-ui へ移行する副作用)は除去する。
      # 条文解説ガイド(clause)等の DL バナーURL: portalRender が <?= serviceGuideUrl ?> /
      #   <?= licenseGuideUrl ?> / {{GDRIVE_URL_SERVICE}} / {{GDRIVE_URL_LICENSE}} を置換。
      # LB_ROLE_ALLOWLIST_EMAILS: staff 未登録でも通す明示メール許可リスト(外部アドレス許可)。
      #   ※ これはアプリ側のロール審査用。IAP(GCP エッジ)のドメイン制限は別途 IAM で許可が必要。
      - --update-env-vars
      - "WORK_MODEL_UI_URL=${_ADMIN_UI_URL},SERVICE_GUIDE_URL=https://docs.google.com/presentation/d/1n0PwoWQJYbsPdzzoC2DYfaLeL5hIFuvoq_PoI9q4kcE/export/pptx,LICENSE_GUIDE_URL=https://docs.google.com/presentation/d/1K0LB62rTYYXgKApMN1YwCgp_L9BRcgLoHDqRilaxhLc/export/pptx,GDRIVE_URL_SERVICE=https://docs.google.com/presentation/d/1n0PwoWQJYbsPdzzoC2DYfaLeL5hIFuvoq_PoI9q4kcE/export/pptx,GDRIVE_URL_LICENSE=https://docs.google.com/presentation/d/1K0LB62rTYYXgKApMN1YwCgp_L9BRcgLoHDqRilaxhLc/export/pptx,LB_ROLE_ALLOWLIST_EMAILS=koktaa-s@kadokawa.jp"
      - --remove-env-vars
      - "ADMIN_UI_URL"
      - --quiet

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - "${_SERVICE_NAME}"
      - --region
      - "${_REGION}"
      - --to-latest
      - --quiet
