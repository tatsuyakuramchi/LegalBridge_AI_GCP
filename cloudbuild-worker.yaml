# Cloud Build pipeline for legalbridge-document-worker (Cloud Run ②)
#
# Trigger: push to `release/worker` branch.
#
# このパイプラインは 2 段で構成する（統合: schema を worker デプロイに一本化）:
#   ① DB マイグレーション（migrations/ ランナー）を実行。成功しない限り worker は出さない。
#   ② services/worker/ をビルドして legalbridge-document-worker にデプロイ。
#
# 設計意図:
#   - スキーマの単一所有者は migrations/ ランナー（worker 起動時の DDL は無い。
#     Phase 7 で旧 RUN_INIT_DB / initDb の起動時レガシー DDL は撤去済み）。
#   - マイグレーションは「デプロイ時に 1 回」適用（boot-time DDL の競合・権限拡大を避ける）。
#   - lb-migrate-database-url（最小権限 lb_migrate ロール）で接続。worker 実行時の
#     DATABASE_URL（アプリ rw ロール）とは別系統で、最小権限を維持。
#   - migration 失敗時はビルドが止まり worker は再デプロイされない（旧 revision が生き続ける）。
#   - 旧 `legalbridge-migrate` 単独トリガーは不要（このパイプラインが migrate ジョブを駆動する）。
#     手動・緊急適用は cloudbuild-migrate.yaml が引き続き使える。
#
# Substitutions (override per-trigger if needed):
#   _REGION           — Cloud Run / Artifact Registry region
#   _REPO             — Artifact Registry repository name
#   _SERVICE_NAME     — worker Cloud Run service name
#   _MIGRATE_JOB_NAME — migration runner の Cloud Run Job 名
#   _DB_INSTANCE      — Cloud SQL インスタンス名（接続名は ${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}）

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _SERVICE_NAME: legalbridge-document-worker
  _MIGRATE_JOB_NAME: legalbridge-migrate
  _DB_INSTANCE: legalbridge-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

steps:
  # ──────────────────────────────────────────────────────────────────────
  # ⓪ 互換VIEW書込みゲート (Phase 4 G1 の退行防止 / phase4-compat-retirement-plan.md)
  #    contract_capabilities / capability_* への INSERT/UPDATE/DELETE が 1 箇所でも
  #    再発したらビルドを止める。スクリプトは rg 不在環境では grep にフォールバックする。
  # ──────────────────────────────────────────────────────────────────────
  - id: gate-compat-writes
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - scripts/audit/compat_view_refs.sh
      - --gate-writes
      - "0"

  # Phase 7 G3: 互換VIEW読取りのラチェット(現状値を上限に「増やさない」)。
  #   読取りを実体表直読みへ移行して減らしたら、この上限も同時に下げていく。
  - id: gate-compat-reads
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - scripts/audit/compat_view_refs.sh
      - --gate-reads
      - "117"

  # ──────────────────────────────────────────────────────────────────────
  # ① DB マイグレーション（worker デプロイの前提。失敗したら以降のステップは走らない）
  #    migrations/ を Cloud Run Job としてビルド→deploy→execute する。
  #    --set-cloudsql-instances を必ず付けるので socket(ENOENT) で落ちない。
  # ──────────────────────────────────────────────────────────────────────
  - id: migrate-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_MIGRATE_JOB_NAME}:${SHORT_SHA}"
      - migrations
    dir: .

  - id: migrate-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_MIGRATE_JOB_NAME}:${SHORT_SHA}"

  # Cloud Run Job を作成/更新（idempotent）。Cloud SQL バインドと lb_migrate 秘密を必ず付与。
  - id: migrate-deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - "${_MIGRATE_JOB_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_MIGRATE_JOB_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --set-cloudsql-instances
      - "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}"
      - --set-secrets
      - "DATABASE_URL=lb-migrate-database-url:latest"
      - --max-retries
      - "1"
      - --task-timeout
      - "600"
      - --quiet

  # 実行して待つ。未適用 migration があれば適用し、無ければ何もせず成功。失敗でビルド中断。
  - id: migrate-execute
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - "${_MIGRATE_JOB_NAME}"
      - --region
      - "${_REGION}"
      - --wait
      - --quiet

  # ──────────────────────────────────────────────────────────────────────
  # ② worker のビルド & デプロイ（① が成功した後にのみ到達する）
  # ──────────────────────────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - services/worker
    dir: .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

  # Deploy without --set-env-vars so Cloud Run keeps its existing secret
  # bindings (DATABASE_URL, BACKLOG_*, GOOGLE_*, SLACK_BOT_TOKEN, etc.).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      # Phase 9: PDF レンダリング (Puppeteer + Chromium) 用にメモリを増量。
      # Chromium のプロセスは 起動時 ~200MB、レンダ中はピーク ~600MB なので
      # 1Gi だと OOMKilled で 503 を返すケースがあるため 2Gi に。
      - --memory
      - 2Gi
      # 2026-07-05 の再ビルドで入った新しめの Debian Chromium は第1世代
      # 実行環境 (gVisor) だと起動できない (inotify/NETLINK/crashpad が
      # カーネルレベルで塞がれており "Failed to launch the browser
      # process!" で即死)。フルカーネルの第2世代に固定する。
      - --execution-environment
      - gen2
      - --cpu
      - "2"
      - --min-instances
      - "0"
      - --max-instances
      - "5"
      - --timeout
      - "600"
      - --quiet

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - "${_SERVICE_NAME}"
      - --region
      - "${_REGION}"
      - --to-latest
      - --quiet
