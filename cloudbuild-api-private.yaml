# Cloud Build pipeline for legalbridge-search-api — PRIVATE / IAP variant
# (Phase 17s)
#
# このパイプラインは公開アクセスを禁止し、HTTPS LB + IAP 経由のみ受け付ける
# 設定で deploy します。**事前準備が完了するまで使わないでください。**
#
# 事前準備チェックリスト:
#   1. legalbridge-search-api がすでに HTTPS LB + IAP の背後に居ること
#      (Backend Service / Serverless NEG / URL map / Forwarding Rule
#       設定済み、Workspace ドメインのみ許可済み)
#   2. LB_SIGNING_SECRET が Secret Manager または env に注入済み
#   3. GAS の ScriptProperty に LB_SIGNING_SECRET / CLOUD_RUN_BASE_URL
#      (LB のドメイン) が設定済み
#   4. 想定外の通信元 (Slack Gateway の keepWarm 等) が無いことを確認
#
# 切り替え手順:
#   gcloud builds triggers create github ... --build-config=cloudbuild-api-private.yaml
#   or trigger 設定で cloudbuild-api.yaml → cloudbuild-api-private.yaml に変更
#
# 元に戻す手順:
#   トリガーを cloudbuild-api.yaml に戻すか、本 yaml の deploy フラグを
#   --allow-unauthenticated + 通常 ingress に手で戻して再デプロイ
#
# 移行期は cloudbuild-api.yaml と併存させ、運用が安定してから旧 yaml を
# 削除します。

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _SERVICE_NAME: legalbridge-search-api

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - services/api
    dir: .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

  # Phase 17s: 非公開デプロイ。
  #   --no-allow-unauthenticated:
  #       インターネット直叩きを拒否。Cloud Run の *.run.app URL に
  #       誰でもアクセスできてしまう状態を防ぐ。
  #   --ingress=internal-and-cloud-load-balancing:
  #       受け口を VPC 内部 or HTTPS LB のみに制限。
  #   Secret bindings (DATABASE_URL / BACKLOG_* / LB_PORTAL_SECRET /
  #   LB_SIGNING_SECRET 等) は --set-env-vars を使わず既存のものを温存。
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --ingress=internal-and-cloud-load-balancing
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "5"
      - --timeout
      - "60"
      - --quiet

  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - "${_SERVICE_NAME}"
      - --region
      - "${_REGION}"
      - --to-latest
      - --quiet
