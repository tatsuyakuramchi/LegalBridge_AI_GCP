# Cloud Build pipeline for LegalBridge Admin UI
#
# Triggered by: pushes to a configured branch (set up in Cloud Build → Triggers).
# Pipeline:
#   1. Build a linux/amd64 Docker image, tag with the short commit SHA + "latest".
#   2. Push both tags to Artifact Registry.
#   3. Deploy the new image to Cloud Run, preserving existing env vars and secrets.
#
# Substitutions (override per-trigger if needed):
#   _REGION       — Cloud Run / Artifact Registry region
#   _REPO         — Artifact Registry repository name
#   _SERVICE_NAME — Cloud Run service name

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _SERVICE_NAME: legalbridge-admin-ui

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

steps:
  # 0. 条件エンドポイント・ラチェット (設計 v1.4 Phase A / UIC-01 / CLEAN-08)。
  #    Admin UI(src/) からレガシー条件エンドポイント(license-matrix / component-lines /
  #    materials/:mid/conditions / condition-lines / link-conditions)への直接参照を
  #    「増やさない」ゲート。条件値の書込みは文書フォーム(Document Command)経由が原則。
  #    Phase C/D で置換して減らしたら、この上限も同時に下げていく。
  #    現状値: 17 (Phase C 第1弾で WorkGraph の license-matrix 直接保存を撤去し 18→17)。
  #    詳細: docs/forms/legacy-condition-endpoints.md
  - id: gate-condition-endpoints
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - scripts/audit/condition_write_refs.sh
      - --gate
      - "17"

  # (Phase 6) 旧 step 0「inject-portal-secret」は撤去した。
  #   共有シークレット(LB_PORTAL_SECRET)を VITE_API_PORTAL_SECRET として
  #   JS bundle に焼き込む方式を廃止し、server.ts の同一オリジン BFF プロキシが
  #   サーバ側 env(Cloud Run の既存シークレットバインド LB_PORTAL_SECRET)で
  #   X-LB-PORTAL-SECRET を付与する。ブラウザ配布物にシークレットは含まれない。
  #   ロールバック時は git 履歴から本ステップを復元すること。

  # 1. Build the image (linux/amd64 — matches Cloud Run runtime).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - .

  # 2. Push both tags. (Cloud Build auto-pushes images listed under `images:`,
  #    but doing it explicitly here gives clearer logs and ordering.)
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

  # 3. Deploy to Cloud Run. We do NOT pass --set-env-vars here so that
  #    Cloud Run keeps the existing env vars and secret bindings (DATABASE_URL,
  #    BACKLOG_API_KEY, SLACK_*, GEMINI_API_KEY, etc.) untouched.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "5"
      - --timeout
      - "300"
      # Phase 6 で共有秘密のバンドル焼き込みを廃止し、BFF プロキシ(server.ts)が
      #   サーバ env の LB_PORTAL_SECRET から X-LB-PORTAL-SECRET を付与する方式へ
      #   移行した。その admin-ui 側の秘密バインドはこれまで「既にバインド済み」の
      #   前提に依存しており、パイプラインでは担保されていなかった。未設定 or 旧
      #   バージョン固定だと search-api の requireIapUser が portal_secret を弾き、
      #   取引先マスター保存(search-api 経由の write)が 401 になる。
      #   ここで :latest を明示バインドし、search-api と同一の値へ自己修復させる。
      #   --update-secrets は指定キーのみ追加/更新し、他の既存バインドは温存する。
      - --update-secrets
      - "LB_PORTAL_SECRET=lb-portal-secret:latest"
      - --quiet

  # 4. Force the freshly deployed revision to take 100% of traffic.
  #
  #    `gcloud run deploy` only auto-promotes when the service is currently
  #    set to "always serve LATEST". On this service, traffic was historically
  #    pinned to a specific revision (00015-mvl), so without this step new
  #    revisions stayed at 0% and the deploy looked successful but the live
  #    URL kept serving the old code. Running update-traffic --to-latest
  #    after every successful deploy makes the pipeline self-healing.
  - id: promote
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - "${_SERVICE_NAME}"
      - --region
      - "${_REGION}"
      - --to-latest
      - --quiet
