<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; padding: 40px; line-height: 1.6; color: #333; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 24px; }
    .meta { margin-bottom: 30px; color: #666; font-size: 0.9em; text-align: right; }
    .section { margin-bottom: 20px; }
    .label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; border-left: 4px solid #333; padding-left: 10px; }
    .content { padding-left: 14px; }
  </style>
</head>
<body>
  <h1>法務相談依頼書 ({{issueKey}})</h1>
  <div class="meta">
    <p>依頼日: {{date}}</p>
    <p>依頼者: {{requester}}</p>
  </div>
  
  <div class="section">
    <span class="label">件名</span>
    <div class="content">{{summary}}</div>
  </div>

  <div class="section">
    <span class="label">詳細情報</span>
    <div class="content">
      <ul>
        {{#each details}}
          <li><strong>{{@key}}:</strong> {{this}}</li>
        {{/each}}
      </ul>
    </div>
  </div>

  <div style="margin-top: 80px; text-align: center; font-size: 0.8em; color: #999;">
    LegalBridge Automated Document Generation System
  </div>
</body>
</html>
