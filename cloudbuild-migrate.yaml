# Cloud Build pipeline for legalbridge-migrate (DDL migration runner / D2)
#
# ⚠️ 標準の適用経路は cloudbuild-worker.yaml ①（release/worker push に統合）です。
#    この config は「手動・緊急適用」専用に残しています。
#    ※ 旧来この config を独立トリガー（例: release/api watch）で自動実行していた場合は
#      二重起動・設定ズレ（_INSTANCE_CONNECTION_NAME 未指定で Cloud SQL バインドが外れ
#      socket ENOENT で失敗）の原因になるため、その独立トリガーは無効化してください。
#
# Builds migrations/ into a Cloud Run Job and executes it. The job applies
# pending migrations/NNNN_*.sql against the DB (schema_migrations tracked),
# then exits. This is the SINGLE owner of DDL — app services do not migrate
# at boot (see docs/service-architecture.md §8).
#
# Substitutions (override per-trigger):
#   _REGION                   — Cloud Run / Artifact Registry region
#   _REPO                     — Artifact Registry repository name
#   _JOB_NAME                 — Cloud Run Job name
#   _DB_INSTANCE              — Cloud SQL instance name（接続名は ${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}）
#
# Prereqs (out-of-band):
#   - `lb_migrate` role exists (migrations/roles.template.sql)
#   - Secret `lb-migrate-database-url` holds the lb_migrate DATABASE_URL,
#     e.g. postgresql://lb_migrate:PW@localhost/legalbridge?host=/cloudsql/<INSTANCE>
#
# 手動実行例:
#   gcloud builds submit --config=cloudbuild-migrate.yaml \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD)

substitutions:
  _REGION: asia-northeast1
  _REPO: legalbridge
  _JOB_NAME: legalbridge-migrate
  # 既定で正しい Cloud SQL 接続名を構成（空デプロイで socket が外れる事故を防止）。
  _DB_INSTANCE: legalbridge-db

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_JOB_NAME}:${SHORT_SHA}"

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform
      - linux/amd64
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_JOB_NAME}:${SHORT_SHA}"
      - migrations
    dir: .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_JOB_NAME}:${SHORT_SHA}"

  # Create or update the Cloud Run Job (idempotent via `jobs deploy`).
  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - "${_JOB_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_JOB_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --set-cloudsql-instances
      - "${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}"
      - --set-secrets
      - "DATABASE_URL=lb-migrate-database-url:latest"
      - --max-retries
      - "1"
      - --task-timeout
      - "600"
      - --quiet

  # Execute now and wait — fails the build if a migration fails.
  - id: execute-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - "${_JOB_NAME}"
      - --region
      - "${_REGION}"
      - --wait
      - --quiet
